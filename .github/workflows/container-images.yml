name: container-images

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to publish"
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: product
            image: ghcr.io/chubo-dev/go-coffeeshop-product-api
            dockerfile: docker/Dockerfile-product
          - service: counter
            image: ghcr.io/chubo-dev/go-coffeeshop-counter-api
            dockerfile: docker/Dockerfile-counter
          - service: grpc-gw
            image: ghcr.io/chubo-dev/go-coffeeshop-grpc-gw
            dockerfile: docker/Dockerfile-proxy
          - service: web
            image: ghcr.io/chubo-dev/go-coffeeshop-web
            dockerfile: docker/Dockerfile-web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tag
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.image_tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          tags: |
            ${{ matrix.image }}:${{ steps.meta.outputs.tag }}
            ${{ matrix.image }}:sha-${{ github.sha }}
